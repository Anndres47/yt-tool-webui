services:
  yt-tool-webui:
    image: yt-tool-webui
    container_name: yt-tool-webui
    build: .
    ports:
      - "8047:8047"
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./outputs:/app/outputs
    environment:
      - YTDL_DATA_PATH=/app/data
      - YTDL_DOWNLOAD_PATH=/app/downloads
      - YTDL_OUTPUT_PATH=/app/outputs
    restart: unless-stopped

  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: pot-provider
    ports:
      - "4416:4416"
    restart: unless-stopped
