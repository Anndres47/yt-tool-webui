<!DOCTYPE html>
<html>
<head>
  <title>YT Downloader</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>YT Downloader</h1>
    <form action="/start" method="POST" enctype="multipart/form-data">
      <input type="text" name="url" placeholder="Video or livestream URL" required>
      <select name="mode">
        <option value="ytdlp">Video (yt-dlp)</option>
        <option value="ytarchive">Livestream (ytarchive)</option>
      </select>
      <input type="text" name="potoken" placeholder="PO Token (optional)">
      <input type="file" name="cookies" accept=".txt">
      <button type="submit">Start Download</button>
    </form>

    <h2>Download History</h2>
    <ul>
      {% for item in history %}
        <li>{{ item.datetime }} | {{ item.mode }} | {{ item.url }}</li>
      {% endfor %}
    </ul>
    <a href="/logout">Logout</a>
  </div>
</body>
</html>
